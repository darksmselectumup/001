<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Минимальная высота на весь экран */
            min-height: 100vh;
            /* Улучшенное отображение фона */
            background: 
                linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4)),
                url('bg.jpg') center/cover no-repeat fixed;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .menu {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            /* Гарантируем, что меню всегда поверх фона */
            z-index: 10;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90px;
            padding: 10px 20px;
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-decoration: none;
            text-align: center;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px #ff00c8, 0 0 20px #ff00c8;
            
            /* Стеклянный эффект, чтобы было видно фон */
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            /* Тонкая граница в тон неона */
            border: 1px solid rgba(0, 247, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            
            box-shadow: 0 0 15px rgba(255, 0, 200, 0.2);
            transition: all 0.3s ease;
        }

        /* Эффект свечения при наведении */
        .btn:hover {
            transform: scale(1.03);
            background: rgba(255, 0, 200, 0.1);
            box-shadow: 0 0 30px rgba(255, 0, 200, 0.5), 0 0 10px rgba(0, 247, 255, 0.5);
            border-color: #00f7ff;
        }

        /* Адаптивность для телефонов */
        @media(max-width: 480px) {
            .btn {
                font-size: 1.1rem;
                min-height: 70px;
                letter-spacing: 2px;
            }
            .menu {
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="menu">
        <a href="https://t.me/elecrum_job" class="btn">INFO CHANNEL</a>
        <a href="https://t.me/electrum_store" class="btn">OPERATOR</a>
    </div>

</body>
</html>
