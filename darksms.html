<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4)),
                url('bg.jpg') center/cover no-repeat fixed;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            
            /* Изменено: выравниваем контент по нижней части экрана */
            align-items: flex-end; 
            justify-content: center;
            
            /* Отступ снизу, чтобы кнопки не прилипали к самому краю */
            padding-bottom: 80px; 
            padding-left: 20px;
            padding-right: 20px;
        }

        .menu {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 85px;
            padding: 10px 20px;
            font-size: 1.4rem;
            letter-spacing: 4px;
            text-decoration: none;
            text-align: center;
            font-weight: 800;
            color: #fff;
            
            /* Неоновое свечение текста в стиле картинки */
            text-shadow: 0 0 10px #ff00c8, 0 0 20px #ff00c8;
            
            /* Стеклянный эффект */
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(0, 247, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            box-shadow: 0 0 15px rgba(255, 0, 200, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            transform: translateY(-5px);
            background: rgba(255, 0, 200, 0.15);
            box-shadow: 0 0 35px rgba(255, 0, 200, 0.6), 0 0 15px rgba(0, 247, 255, 0.5);
            border-color: #00f7ff;
        }

        @media(max-width: 480px) {
            body {
                padding-bottom: 50px; /* Чуть выше на мобильных */
            }
            .btn {
                font-size: 1.1rem;
                min-height: 75px;
            }
        }
    </style>
</head>
<body>

    <div class="menu">
        <a href="https://t.me/elecrum_job" class="btn">INFO CHANNEL</a>
        <a href="https://t.me/electrum_store" class="btn">OPERATOR</a>
    </div>

</body>
</html>
