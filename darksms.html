<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark SMS // Transparent Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f7ff;
            --pink: #ff00c8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            /* Фон открыт полностью, затемнение только в зоне кнопок */
            background: 
                linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 30%),
                url('bg.jpg') center/cover no-repeat fixed;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
            overflow: hidden;
        }

        .main-ui {
            width: 100%;
            max-width: 480px;
            z-index: 10;
            padding: 0 15px;
        }

        /* Тонкая информационная полоска с белой обводкой */
        .status-bar {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 15px;
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .promo-text {
            color: #fff;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .price-tag {
            color: var(--cyan);
            font-size: 1.1rem;
            font-weight: 900;
            margin-left: 8px;
            text-shadow: 0 0 10px var(--cyan);
        }

        /* --- КНОПКИ "LIGHT GLASS" --- */
        .btn-container { display: flex; flex-direction: column; gap: 10px; }

        .btn {
            position: relative;
            height: 55px; /* Компактная высота для сохранения видимости арта */
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
        }

        .btn-label {
            font-size: 1rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 5px;
            text-transform: uppercase;
            z-index: 2;
            transition: 0.4s;
        }

        /* Эффект "бегущей энергии" по периметру */
        .btn::after {
            content: "";
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: 8px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            background-size: 200% auto;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            opacity: 0.3;
            animation: flow 3s linear infinite;
        }

        .btn-op::after { background: linear-gradient(90deg, transparent, var(--pink), transparent); background-size: 200% auto; }

        /* Наведение: эффект вспышки */
        .btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .btn:hover .btn-label { letter-spacing: 8px; text-shadow: 0 0 15px #fff; }
        .btn:hover::after { opacity: 1; filter: brightness(1.5); }

        @keyframes flow { to { background-position: 200% center; } }

        @media(max-width: 480px) {
            .main-ui { max-width: 360px; }
            .promo-text { font-size: 0.7rem; }
            .btn { height: 50px; }
            .btn-label { font-size: 0.85rem; letter-spacing: 3px; }
        }
    </style>
</head>
<body>

    <div class="main-ui">
        <div class="status-bar">
            <span class="promo-text">UKRAINIAN SECURE NODE // </span>
            <span class="price-tag">TELEGRAM - 7$</span>
        </div>

        <div class="btn-container">
            <a href="https://t.me/elecrum_job" class="btn">
                <span class="btn-label">INFO CHANNEL</span>
            </a>
            <a href="https://t.me/electrum_store" class="btn btn-op">
                <span class="btn-label">OPERATOR</span>
            </a>
        </div>
    </div>

</body>
</html>
