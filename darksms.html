<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark SMS Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --c1: #00f7ff;
            --c2: #ff00c8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            height: 100vh;
            background: #000;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 40px;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Живой фон с частицами (Canvas имитация через CSS) */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.jpg') center/cover no-repeat;
            filter: brightness(0.4) contrast(1.2);
            z-index: -1;
        }

        /* Сетка киберпространства */
        .grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 247, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 247, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 1000px; } }

        .main-container {
            width: 100%;
            max-width: 550px;
            z-index: 100;
            padding: 0 25px;
            text-align: center;
        }

        /* Плашка с эффектом "Магнитного стекла" */
        .info-card {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 4px; /* Острые углы для агрессивности */
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(40px);
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,1), inset 0 0 20px rgba(0, 247, 255, 0.1);
        }

        /* Текстовые эффекты */
        .promo-text { color: #fff; text-transform: uppercase; font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; }
        .price-line { 
            display: block; margin-top: 10px; font-size: 1.8rem; 
            color: var(--c1); text-shadow: 0 0 20px var(--c1);
            animation: glitch 3s infinite;
        }

        /* --- КНОПКИ-ТИТАНЫ --- */
        .menu { display: flex; flex-direction: column; gap: 25px; }

        .btn {
            position: relative;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s;
            overflow: hidden;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); /* Скошенные края */
        }

        .btn-text {
            font-size: 1.6rem;
            color: #fff;
            z-index: 10;
            letter-spacing: 6px;
            transition: 0.5s;
            text-shadow: 2px 2px 0px var(--c2);
        }

        /* Анимированная плазма внутри кнопки */
        .btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 300%; height: 300%;
            background: radial-gradient(circle, var(--c1) 0%, transparent 50%);
            transform: translate(-50%, -50%) scale(0);
            transition: 0.8s;
            opacity: 0.2;
            z-index: 1;
        }

        .btn:hover::before { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }

        /* Энергетические линии по бокам */
        .btn::after {
            content: '';
            position: absolute;
            left: 0; top: 0; width: 4px; height: 100%;
            background: var(--c1);
            box-shadow: 0 0 20px var(--c1);
            animation: pulse 1.5s infinite;
        }

        .btn-op::after { background: var(--c2); box-shadow: 0 0 20px var(--c2); }

        /* Наведение */
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(10px);
            border-color: #fff;
        }

        .btn:hover .btn-text { letter-spacing: 12px; color: #fff; text-shadow: 0 0 20px #fff; }

        /* Анимации Глитча и Пульсации */
        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-5px, 2px); }
            4% { transform: translate(5px, -2px); }
            6% { transform: translate(0); }
            100% { transform: translate(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; height: 100%; }
            50% { opacity: 0.3; height: 50%; }
        }

        @media(max-width: 480px) {
            .btn { height: 80px; }
            .btn-text { font-size: 1.1rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <div class="grid"></div>

    <div class="main-container">
        
        <div class="info-card">
            <div class="promo-text">
                УКРАЇНСЬКИЙ МАГАЗИН<br>
                АНОНІМНИХ НОМЕРІВ
                <span class="price-line">TELEGRAM - 7$ АККАУНТ</span>
            </div>
        </div>

        <div class="menu">
            <a href="https://t.me/elecrum_job" class="btn">
                <span class="btn-text">ІНФО КАНАЛ</span>
            </a>
            <a href="https://t.me/electrum_store" class="btn btn-op">
                <span class="btn-text">ОПЕРАТОР</span>
            </a>
        </div>
    </div>

</body>
</html>
